{% extends "base.html" %}
{% block title %}403 Forbidden{% endblock %}
{% block content %}
<div class="text-center py-5">
    <div style="font-size:5rem; color:#e5e7eb; font-family:'IBM Plex Mono',monospace; font-weight:600; line-height:1;">403</div>
    <h2 class="mt-2 mb-2">Access Denied</h2>
    <p class="text-muted">You do not have permission to access this resource.<br>This action requires Administrator privileges.</p>
    <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary mt-2">
        <i class="bi bi-house me-1"></i>Return to Dashboard
    </a>
</div>
{% endblock %}
